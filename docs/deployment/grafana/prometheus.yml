global:
  scrape_interval: 5s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: dhs
    static_configs:
      # host.docker.internal works on Docker Desktop (Mac, Windows).
      # On Linux docker, replace with the host's LAN IP or use
      # network_mode: host.
      - targets: ["host.docker.internal:9100"]
        labels:
          service: dhs

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go: ["1.22"]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Go mod tidy
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -count=1 -race ./...

      - name: Unit tests (coverage)
        if: matrix.os == 'ubuntu-latest'
        run: go test -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  test-rhel:
    name: Test (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - distro: rocky9
            image: rockylinux:9
          - distro: rhel9-ubi
            image: redhat/ubi9:latest
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install git
        run: dnf install -y git

      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Fix git ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build -buildvcs=false ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build-all:
    name: Cross-compile
    runs-on: ubuntu-latest
    needs: [test, test-rhel, lint]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build all targets
        run: |
          VERSION=$(git describe --tags --dirty --always)
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"

          for GOOS in linux darwin windows; do
            for GOARCH in amd64 arm64; do
              EXT=""
              if [ "$GOOS" = "windows" ] && [ "$GOARCH" = "arm64" ]; then continue; fi
              if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
              echo "Building ${GOOS}/${GOARCH}..."
              GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "${LDFLAGS}" \
                -o "dist/acp_${GOOS}_${GOARCH}/acp${EXT}" ./cmd/acp
            done
          done

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/
